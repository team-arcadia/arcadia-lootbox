name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Generate release notes
        id: notes
        run: |
          echo "## Arcadia LootBox v${{ steps.version.outputs.VERSION }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "- \`ArcadiaLootbox-${{ steps.version.outputs.VERSION }}.jar\` - Main mod file" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Requirements" >> RELEASE_NOTES.md
          echo "- Minecraft 1.21.1" >> RELEASE_NOTES.md
          echo "- NeoForge 21.1+" >> RELEASE_NOTES.md
          echo "- Arcadia Lib >= 1.2.0" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "1. Place \`arcadia-lib\` in your \`mods/\` folder" >> RELEASE_NOTES.md
          echo "2. Place \`ArcadiaLootbox\` in your \`mods/\` folder" >> RELEASE_NOTES.md
          echo "3. (Optional) Install LuckPerms for permission features" >> RELEASE_NOTES.md
          echo "4. Start the server" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "See [CHANGELOG.md](CHANGELOG.md) for full details." >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: build/libs/ArcadiaLootbox-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
